database {
    url = "jdbc:h2:mem:kz_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DEFAULT_NULL_ORDERING=HIGH"
    maximumPoolSize = 2
    username = sa
    password = ""
}

r2 {
    endpoint = "https://test.r2.example.com"
    accessKeyId = "test-key-id"
    secretAccessKey = "test-secret"
    bucket = "test-bucket"
}

admin {
    bearerKey = "test-admin-bearer-key"
}

security {
    metricsBearerKey = "test-metrics-key"
    maxWsFrameBytes = 2097152
    maxReplayBytes = 104857600
    maxConcurrentReplayUploadsPerServer = 10
    replayUploadTtlMinutes = 30
    requireReplayForLeaderboard = false
    wsUpgradePerIpPerMinute = 1000
    addRecordPerServerPerMinute = 1000
    replayBytesPerServerPerSecond = 52428800
    readQueryPerServerPerSecond = 1000
    wantPlayerRecordsDefaultLimit = 50
    wantPlayerRecordsMaxLimit = 100
    eventLogRetentionDays = 90
}
