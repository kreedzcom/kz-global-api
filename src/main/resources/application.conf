ktor {
    deployment {
        host = "0.0.0.0"
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ kz.global.api.ApplicationKt.module ]
    }
}

database {
    url = ${DATABASE_URL}
    username = ${?POSTGRES_USER}
    password = ${?POSTGRES_PASSWORD}
    maximumPoolSize = 10
    maximumPoolSize = ${?DATABASE_POOL_SIZE}
}

r2 {
    endpoint = ${R2_ENDPOINT}
    accessKeyId = ${R2_ACCESS_KEY_ID}
    secretAccessKey = ${R2_SECRET_ACCESS_KEY}
    bucket = ${R2_BUCKET}
}

admin {
    bearerKey = ${ADMIN_BEARER_KEY}
}

security {
    metricsBearerKey = ${?METRICS_BEARER_KEY}
    maxWsFrameBytes = 2097152
    maxReplayBytes = 104857600
    maxConcurrentReplayUploadsPerServer = 10
    replayUploadTtlMinutes = 30
    requireReplayForLeaderboard = false
    requireReplayForLeaderboard = ${?REQUIRE_REPLAY_FOR_LEADERBOARD}
    wsUpgradePerIpPerMinute = 30
    addRecordPerServerPerMinute = 120
    replayBytesPerServerPerSecond = 5242880
    readQueryPerServerPerSecond = 20
    wantPlayerRecordsDefaultLimit = 50
    wantPlayerRecordsMaxLimit = 100
    eventLogRetentionDays = 90
    maxWrImprovementRatio = ${?MAX_WR_IMPROVEMENT_RATIO}
}
