name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # gradle/actions v4.4.3 (refs/tags/v4 → commit); pin SHA for supply chain policy
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a

      - name: Build, test, and JaCoCo XML report
        run: ./gradlew build jacocoTestReport --no-daemon

      # SonarCloud "Automatic Analysis" (repo integration without CI) does not import JaCoCo —
      # coverage only appears when this job runs ./gradlew sonar with the XML below.
      - name: Verify JaCoCo XML exists (required for Sonar coverage)
        run: |
          test -f build/reports/jacoco/test/jacocoTestReport.xml
          echo "JaCoCo XML size: $(wc -c < build/reports/jacoco/test/jacocoTestReport.xml) bytes"

      - name: SonarCloud scan (Gradle; uploads JaCoCo coverage)
        if: >
          vars.SONARQUBE_ENABLED == 'true' &&
          (github.event_name != 'pull_request' ||
           github.event.pull_request.head.repo.full_name == github.repository)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          ./gradlew sonar --no-daemon
          -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
          -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
